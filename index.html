  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let userName = '';
    let currentQuestion = 0;
    let timerInterval;
    let answers = [];

    // ==================== HOW TO ADD QUESTIONS (Easy Tutorial) ====================
    // Just add new questions inside the array below.
    // Each question must have: q, options, correct
    // Separate questions with a comma (,)
    // Questions will appear in completely random order every time.

    const questions = [
      {
        q: "This is a test question.\nPlease select the correct answer to test the system.\n\nPress the option that says 'correct'.",
        options: ["correct", "incorrect", "maybe", "not sure"],
        correct: 0
      },
      {
         q: "What is the capital of Uzbekistan?",
         options: ["Tashkent", "Samarkand", "Bukhara", "Andijan"],
         correct: 0
      }, 
      {
         q: "What is 5 + 5?",
         options: ["15", "10", "11", "55"],
         correct: 1
      },
       {
         q: "Will Yaxyo get bonus for this😊?",
         options: ["Yes", "Maybe", "No"],
         correct: 0
      },
      // ← Add more questions here like this:
      // ,
      // {
      //   q: "What is the capital of Uzbekistan?",
      //   options: ["Tashkent", "Samarkand", "Bukhara", "Andijan"],
      //   correct: 0
      // },
      // {
      //   q: "What is 15 + 15?",
      //   options: ["25", "30", "20", "35"],
      //   correct: 1
      // }
    ];

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh2rUEhcMERbFezzKB4NKILmU_cH3KSU-g2vu0P8NG/dev";

    // Shuffle function (makes questions appear randomly)
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function startQuiz() {
      userName = document.getElementById('user-name').value.trim();
      if (!userName) return alert("Name is required!");

      // Shuffle questions every time someone starts the quiz
      shuffleArray(questions);

      document.getElementById('name-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      currentQuestion = 0;
      answers = [];
      loadQuestion();
    }

    function loadQuestion() {
      if (currentQuestion >= questions.length) {
        submitAutomatically();
        return;
      }
      const q = questions[currentQuestion];
      document.getElementById('question-text').innerText = q.q;
      const optsDiv = document.getElementById('options');
      optsDiv.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => selectAnswer(i);
        optsDiv.appendChild(btn);
      });
      startProgressBar();
    }

    function startProgressBar() {
      const bar = document.getElementById('progress-bar');
      let timeLeft = 8;
      bar.style.width = '100%';
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        bar.style.width = (timeLeft / 8 * 100) + '%';
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          answers.push({ qIndex: currentQuestion, answer: null, correct: false });
          currentQuestion++;
          loadQuestion();
        }
      }, 100);
    }

    function selectAnswer(selected) {
      clearInterval(timerInterval);
      const q = questions[currentQuestion];
      answers.push({
        qIndex: currentQuestion,
        answer: q.options[selected],
        correct: selected === q.correct
      });
      currentQuestion++;
      loadQuestion();
    }

    function submitAutomatically() {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('thank-screen').style.display = 'block';
      generateAndSendPDF();
    }

    // ==================== PROFESSIONAL MODERN PDF ====================
    function generateAndSendPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      const submissionDate = new Date().toLocaleString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      const correctCount = answers.filter(ans => ans.correct === true).length;
      const totalQuestions = questions.length;
      const scorePercent = Math.round((correctCount / totalQuestions) * 100);

      // Modern Header
      doc.setFillColor(30, 64, 175);
      doc.rect(0, 0, 210, 52, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(32);
      doc.text("Quiz Result", 105, 32, { align: "center" });
      doc.setFontSize(15);
      doc.setTextColor(220, 220, 255);
      doc.text(userName.toUpperCase(), 105, 46, { align: "center" });

      let y = 72;

      // Participant Info
      doc.setDrawColor(220, 220, 220);
      doc.setLineWidth(0.5);
      doc.rect(18, y, 174, 28, 'S');
      doc.setTextColor(40, 40, 40);
      doc.setFontSize(13);
      doc.text("Participant", 25, y + 10);
      doc.setFontSize(14);
      doc.text(userName, 25, y + 19);
      doc.text("Submitted", 120, y + 10);
      doc.setFontSize(12);
      doc.text(submissionDate, 120, y + 19);

      y += 45;

      // Score Card
      doc.setFillColor(245, 247, 255);
      doc.rect(18, y, 174, 48, 'F');
      doc.setDrawColor(34, 158, 217);
      doc.setLineWidth(1.5);
      doc.rect(18, y, 174, 48, 'S');
      doc.setFontSize(22);
      doc.setTextColor(34, 158, 217);
      doc.text(`Score: ${correctCount}/${totalQuestions}`, 105, y + 24, { align: "center" });
      doc.setFontSize(16);
      doc.text(`${scorePercent}%`, 105, y + 38, { align: "center" });

      y += 65;

      // Answers Section
      doc.setFontSize(14);
      doc.setTextColor(30, 30, 30);
      doc.text("Your Answers", 20, y);
      y += 12;
      doc.setLineWidth(0.4);
      doc.setDrawColor(200, 200, 200);
      doc.line(20, y, 190, y);
      y += 15;

      answers.forEach((ans, i) => {
        const q = questions[i];
        const userAnswer = ans.answer || "Time expired";
        const isCorrect = ans.correct;

        const questionLines = doc.splitTextToSize(`${i+1}. ${q.q}`, 165);
        doc.setFontSize(12.5);
        doc.setTextColor(40, 40, 40);
        doc.text(questionLines, 20, y);
        y += questionLines.length * 6.5 + 8;

        doc.setFontSize(12);
        if (isCorrect) {
          doc.setTextColor(34, 139, 34);
          doc.text(` a: ${userAnswer}`, 25, y);
        } else {
          doc.setTextColor(220, 38, 38);
          doc.text(` a: ${userAnswer}`, 25, y);
        }
        y += 11;

        doc.setTextColor(100, 100, 100);
        doc.setFontSize(11);
        doc.text(` Correct Answer: ${q.options[q.correct]}`, 25, y);
        y += 22;

        if (y > 270) {
          doc.addPage();
          y = 30;
        }
      });

      // Footer
      doc.setFontSize(9);
      doc.setTextColor(140, 140, 140);
      doc.text("Thank you for completing the quiz", 105, 285, { align: "center" });
      doc.text("Generated with Telegram Mini App", 105, 292, { align: "center" });

      const pdfBase64 = doc.output('datauristring').split(',')[1];

      // Progress
      const progressBar = document.getElementById('progress-bar');
      let progress = 0;
      const progressInterval = setInterval(() => {
        progress += 12 + Math.random() * 18;
        if (progress > 92) progress = 92;
        progressBar.style.width = progress + '%';
      }, 200);

      // Send to Google Script
      setTimeout(() => {
        clearInterval(progressInterval);
        progressBar.style.width = '100%';

        const payload = {
          userName: userName,
          correctAnswers: correctCount,
          totalQuestions: totalQuestions,
          scorePercent: scorePercent,
          pdfBase64: pdfBase64,
          submissionDate: submissionDate
        };

        fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          mode: 'no-cors'
        })
        .then(() => {
          document.getElementById('thank-title').innerHTML = "✅ Thank you!";
          document.getElementById('thank-text').innerHTML = "Your submission has been recorded.<br>You can close this window now.";
        })
        .catch(err => {
          console.error("Fetch error:", err);
          document.getElementById('thank-title').innerHTML = "✅ Thank you!";
          document.getElementById('thank-text').innerHTML = "Your submission has been recorded.<br>You can close this window now.";
        });
      }, 1600);
    }
  </script>
</body>
</html>
